server:
  port: 8888   # Default port for Config Server

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: https://github.com/Mintbeast7/project-configurations.git   # 🔁 Your config repo
          default-label: main                                                     # branch name
          clone-on-start: true                                                    # clone at startup
          search-paths: microservice-platfrom                           # folder inside repo (optional)